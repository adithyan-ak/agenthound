# AgentHound demo lab.
#
# Covers the DC35 demo arc: config → scan → discover → loot → findings,
# with poison/revert available as a manual workshop step.
# Lightweight Python stubs serve the canonical responses each fingerprinter
# and Looter expects; production fingerprinting against real instances is
# the operator's path.
#
# Subnet 172.30.0.0/24:
#   172.30.0.10 — ollama-stub    (port 11434)
#   172.30.0.20 — litellm-stub   (port 4000)
#   172.30.0.30 — operator        (mounted MCP config)
#   172.30.0.40 — vllm-stub      (port 8000)
#   172.30.0.50 — openwebui-stub  (port 3000, proxies to ollama)
#   172.30.0.60 — jupyter-stub   (port 8888)
#   172.30.0.70 — mcp-stub       (port 8080, poison/revert target)
#   172.30.0.80 — a2a-stub       (port 8080, discovery target)
#
# Run:
#   make demo
#   open http://localhost:8080


networks:
  demo-lab:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

services:
  ollama:
    build:
      context: ./ollama-stub
    container_name: agenthound-demo-ollama
    networks:
      demo-lab:
        ipv4_address: 172.30.0.10
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:11434/api/version', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 12

  litellm-stub:
    build:
      context: ./litellm-stub
    container_name: agenthound-demo-litellm
    networks:
      demo-lab:
        ipv4_address: 172.30.0.20
    environment:
      - LITELLM_MASTER_KEY=sk-DEMO-CHAIN-KEY-NOT-REAL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 12

  operator:
    image: alpine:3.20
    container_name: agenthound-demo-operator
    networks:
      demo-lab:
        ipv4_address: 172.30.0.30
    volumes:
      - ./operator-config:/operator/config:ro
    command: ["sh", "-c", "tail -f /dev/null"]

  vllm-stub:
    build:
      context: ./vllm-stub
    container_name: agenthound-demo-vllm
    networks:
      demo-lab:
        ipv4_address: 172.30.0.40
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/models', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 12

  openwebui-stub:
    build:
      context: ./openwebui-stub
    container_name: agenthound-demo-openwebui
    networks:
      demo-lab:
        ipv4_address: 172.30.0.50
    environment:
      # Stub will surface this as ollama.base_url in /api/config so the
      # OpenWebUI fingerprinter emits the EXPOSES edge to the Ollama
      # backend at 172.30.0.10.
      - OLLAMA_BASE_URL=http://172.30.0.10:11434
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3000/api/version', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 12

  jupyter-stub:
    build:
      context: ./jupyter-stub
    container_name: agenthound-demo-jupyter
    networks:
      demo-lab:
        ipv4_address: 172.30.0.60
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8888/api/status', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 12

  mcp-stub:
    build:
      context: ./mcp-stub
    container_name: agenthound-demo-mcp
    networks:
      demo-lab:
        ipv4_address: 172.30.0.70
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; req=urllib.request.Request('http://127.0.0.1:8080/', data=json.dumps({'jsonrpc':'2.0','id':1,'method':'initialize','params':{}}).encode(), headers={'Content-Type':'application/json'}); urllib.request.urlopen(req, timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 12

  a2a-stub:
    build:
      context: ./a2a-stub
    container_name: agenthound-demo-a2a
    networks:
      demo-lab:
        ipv4_address: 172.30.0.80
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/.well-known/agent-card.json', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 12

  collector-runner:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.agenthound
    profiles: ["tools"]
    networks:
      - demo-lab
    environment:
      - HOME=/out/home
    volumes:
      - ./out:/out
      - ./operator-config:/demo/operator-config:ro
