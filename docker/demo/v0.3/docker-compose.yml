# AgentHound v0.3 demo lab.
#
# Extends the v0.2 lab with three new fingerprintable AI services
# (vLLM, Open WebUI, Jupyter) plus a discoverable MCP server. The full
# v0.3 demo arc fires the credential chain (v0.2) AND the new
# protocol-discovery + Ollama Looter paths in a single recordable run.
#
# Subnet 172.30.0.0/24 (distinct from v0.2's 172.20.0.0/24 so both labs
# can coexist):
#   172.30.0.10 — ollama        (port 11434)        — v0.2 carry-over
#   172.30.0.20 — litellm-stub  (port 4000)         — v0.2 carry-over
#   172.30.0.30 — operator      (mounted MCP config)
#   172.30.0.40 — vllm-stub     (port 8000)         — v0.3 NEW
#   172.30.0.50 — openwebui-stub (port 3000)        — v0.3 NEW (proxies to ollama)
#   172.30.0.60 — jupyter-stub  (port 8888)         — v0.3 NEW
#   172.30.0.70 — mcp-stub      (port 8080)         — v0.3 NEW (for `discover`)
#
# Run end-to-end demo:
#
#   docker compose -f docker/demo/v0.3/docker-compose.yml up -d
#   ./scripts/seed-demo-v0.3.sh
#   open http://localhost:8080
#
# v0.3 ships stub images for vLLM / Open WebUI / Jupyter / MCP because
# the real upstream images are heavy (vLLM needs CUDA; Jupyter is a
# multi-GiB Python image) and the demo only needs each service to
# answer its fingerprint probe. Stubs deliver canonical responses on
# the documented endpoints; production fingerprinting against real
# instances is the operator's path.


networks:
  demo-lab-v3:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

services:
  ollama:
    image: ollama/ollama:latest
    container_name: agenthound-demo-v3-ollama
    networks:
      demo-lab-v3:
        ipv4_address: 172.30.0.10
    environment:
      - OLLAMA_HOST=0.0.0.0:11434

  litellm-stub:
    build:
      context: ../litellm-stub
    container_name: agenthound-demo-v3-litellm
    networks:
      demo-lab-v3:
        ipv4_address: 172.30.0.20
    environment:
      - LITELLM_MASTER_KEY=sk-DEMO-CHAIN-KEY-NOT-REAL

  operator:
    image: alpine:3.20
    container_name: agenthound-demo-v3-operator
    networks:
      demo-lab-v3:
        ipv4_address: 172.30.0.30
    volumes:
      - ../operator-config:/operator/config:ro
    command: ["sh", "-c", "tail -f /dev/null"]

  vllm-stub:
    build:
      context: ./vllm-stub
    container_name: agenthound-demo-v3-vllm
    networks:
      demo-lab-v3:
        ipv4_address: 172.30.0.40

  openwebui-stub:
    build:
      context: ./openwebui-stub
    container_name: agenthound-demo-v3-openwebui
    networks:
      demo-lab-v3:
        ipv4_address: 172.30.0.50
    environment:
      # Stub will surface this as ollama.base_url in /api/config so the
      # OpenWebUI fingerprinter emits the EXPOSES edge to the Ollama
      # backend at 172.30.0.10.
      - OLLAMA_BASE_URL=http://172.30.0.10:11434

  jupyter-stub:
    build:
      context: ./jupyter-stub
    container_name: agenthound-demo-v3-jupyter
    networks:
      demo-lab-v3:
        ipv4_address: 172.30.0.60

  mcp-stub:
    build:
      context: ./mcp-stub
    container_name: agenthound-demo-v3-mcp
    networks:
      demo-lab-v3:
        ipv4_address: 172.30.0.70

  a2a-stub:
    build:
      context: ./a2a-stub
    container_name: agenthound-demo-v3-a2a
    networks:
      demo-lab-v3:
        ipv4_address: 172.30.0.80
