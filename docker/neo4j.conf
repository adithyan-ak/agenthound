# ── AgentHound All-in-One Neo4j Configuration ──

# Data directory on persistent volume
dbms.directories.data=/data/neo4j

# Memory — conservative for shared container (Neo4j + Postgres + Go)
dbms.memory.heap.initial_size=256m
dbms.memory.heap.max_size=512m
dbms.memory.pagecache.size=256m

# Authentication — enabled with internal credentials
dbms.security.auth_enabled=true

# APOC procedures whitelist
dbms.security.procedures.unrestricted=apoc.merge.*,apoc.algo.*

# Connectors — internal only (localhost)
dbms.connector.bolt.listen_address=127.0.0.1:7687
dbms.connector.http.listen_address=127.0.0.1:7474

# Logging — to stdout for docker logs
dbms.logs.debug.level=INFO
