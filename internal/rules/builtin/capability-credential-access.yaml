id: capability-credential-access
name: Credential Access Capability
description: >
  Classifies tools with credential/secret access capability based on
  keywords in tool name, description, and input schema properties.
version: 1
enabled: true
scope:
  collector: mcp
  targets: [tool.combined]
severity: high
owasp: [MCP06]
tags: [capability, credential-access]
matcher:
  type: keyword
  keywords: [password, credential, secret, api_key, token, ssh_key, private_key, auth, vault]
  case_insensitive: true
  match_mode: any
emit:
  finding_type: capability_classification
  property_key: capability_surface
  property_value: credential_access
tests:
  - input: "get_secret Retrieves a secret from the vault"
    should_match: true
    description: "matches secret and vault keywords"
  - input: "rotate_api_key Rotates the API key for a service"
    should_match: true
    description: "matches api_key keyword"
  - input: "Formats a date string"
    should_match: false
    description: "no credential keywords present"
