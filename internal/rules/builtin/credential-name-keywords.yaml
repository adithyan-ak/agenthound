id: credential-name-keywords
name: Credential Name Detection
description: >
  Detects environment variable or header names that likely contain
  credentials based on common naming patterns (KEY, TOKEN, SECRET, etc.).
version: 1
enabled: true
scope:
  collector: config
  targets: [credential.name]
severity: medium
owasp: [MCP07, ASI09]
tags: [credential]
matcher:
  type: keyword
  keywords: [KEY, TOKEN, SECRET, PASSWORD, CREDENTIAL, AUTH, API_KEY]
  case_insensitive: true
  match_mode: any
emit:
  finding_type: credential_detected
  labels: [credential_name]
tests:
  - input: "OPENAI_API_KEY"
    should_match: true
    description: "matches API_KEY pattern"
  - input: "DATABASE_PASSWORD"
    should_match: true
    description: "matches PASSWORD pattern"
  - input: "AUTH_TOKEN"
    should_match: true
    description: "matches both AUTH and TOKEN patterns"
  - input: "LOG_LEVEL"
    should_match: false
    description: "non-credential environment variable"
  - input: "PORT"
    should_match: false
    description: "non-credential configuration"
