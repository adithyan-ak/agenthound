id: capability-email-send
name: Email Send Capability
description: >
  Classifies tools with email sending capability based on keywords in
  tool name, description, and input schema properties.
version: 1
enabled: true
scope:
  collector: mcp
  targets: [tool.combined]
severity: medium
owasp: [MCP06]
tags: [capability, email-send]
matcher:
  type: keyword
  keywords: [email, smtp, send_mail, sendmail, mail_send, send_email, notify]
  case_insensitive: true
  match_mode: any
emit:
  finding_type: capability_classification
  property_key: capability_surface
  property_value: email_send
tests:
  - input: "send_email Sends an email via SMTP"
    should_match: true
    description: "matches email, smtp, and send_email keywords"
  - input: "notify Send a notification to the user"
    should_match: true
    description: "matches notify keyword"
  - input: "Compresses a file to zip format"
    should_match: false
    description: "no email keywords present"
