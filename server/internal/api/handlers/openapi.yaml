openapi: 3.0.3
info:
  title: AgentHound API
  description: >-
    REST API for `agenthound-server`. The API has no application-layer
    authentication; it binds to 127.0.0.1:8080 by default. AgentHound is a
    graph-based security tool that enumerates MCP servers and A2A agents,
    builds trust graphs in Neo4j, and discovers attack paths across protocol
    boundaries.


    Note: this server runs without auth. Generated client code should not
    attempt Bearer authentication or send Authorization headers.
  version: "0.1.0"
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: /api/v1
    description: Default

security: []

components:
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"

    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: description of the problem
        details:
          description: Additional error context (validation errors, etc.)

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
        neo4j:
          type: string
          enum: [ok, unavailable]
        postgres:
          type: string
          enum: [ok, unavailable]

    GraphStats:
      type: object
      properties:
        node_counts:
          type: object
          additionalProperties:
            type: integer
        edge_counts:
          type: object
          additionalProperties:
            type: integer
        total_nodes:
          type: integer
        total_edges:
          type: integer

    Node:
      type: object
      properties:
        id:
          type: string
        kinds:
          type: array
          items:
            type: string
        properties:
          type: object
          additionalProperties: true

    Edge:
      type: object
      properties:
        source:
          type: string
        target:
          type: string
        kind:
          type: string
        source_kind:
          type: string
        target_kind:
          type: string
        properties:
          type: object
          additionalProperties: true

    NodeDetail:
      type: object
      properties:
        node:
          $ref: "#/components/schemas/Node"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/Edge"

    PathRequest:
      type: object
      required: [source, source_kind]
      properties:
        source:
          type: string
        target:
          type: string
        source_kind:
          type: string
        target_kind:
          type: string
        max_hops:
          type: integer
          default: 10
          minimum: 1
          maximum: 20
        limit:
          type: integer
          default: 10
          minimum: 1
          maximum: 100

    PathNode:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        kinds:
          type: array
          items:
            type: string

    PathEdge:
      type: object
      properties:
        kind:
          type: string
        source:
          type: string
        target:
          type: string
        risk_weight:
          type: number

    PathResult:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/PathNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/PathEdge"
        hops:
          type: integer
        weight:
          type: number

    PathResponse:
      type: object
      properties:
        paths:
          type: array
          items:
            $ref: "#/components/schemas/PathResult"
        algorithm:
          type: string
          description: Only present for weighted-path responses

    Finding:
      type: object
      properties:
        id:
          type: string
        severity:
          type: string
          enum: [critical, high, medium, low]
        category:
          type: string
        title:
          type: string
        description:
          type: string
        edge_kind:
          type: string
        source_id:
          type: string
        source_name:
          type: string
        source_kind:
          type: string
        target_id:
          type: string
        target_name:
          type: string
        target_kind:
          type: string
        confidence:
          type: number
        owasp_map:
          type: array
          items:
            type: string

    PreBuiltQuery:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        severity:
          type: string
        owasp_map:
          type: array
          items:
            type: string

    PreBuiltResult:
      type: object
      properties:
        query:
          $ref: "#/components/schemas/PreBuiltQuery"
        rows:
          type: array
          items:
            type: object
            additionalProperties: true

    IngestResult:
      type: object
      properties:
        scan_id:
          type: string
        nodes_written:
          type: integer
        edges_written:
          type: integer
        warnings:
          type: array
          items:
            type: string
        post_processing_stats:
          type: array
          items:
            type: object
            properties:
              processor_name:
                type: string
        duration:
          type: integer
          description: Duration in nanoseconds

    Scan:
      type: object
      properties:
        id:
          type: string
        collector:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        node_count:
          type: integer
        edge_count:
          type: integer
        error:
          type: string
        metadata:
          type: object
          additionalProperties: true

    CreateScanRequest:
      type: object
      required: [collector]
      properties:
        collector:
          type: string
          enum: [mcp, a2a, config]
        metadata:
          type: object
          additionalProperties: true

    QueryRequest:
      type: object
      required: [cypher]
      properties:
        cypher:
          type: string
        params:
          type: object
          additionalProperties: true

    QueryResponse:
      type: object
      properties:
        rows:
          type: array
          items:
            type: object
            additionalProperties: true

  responses:
    ValidationError:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

paths:
  /health:
    get:
      summary: Health check
      description: Returns Neo4j and PostgreSQL connectivity status.
      operationId: getHealth
      tags: [Public]
      responses:
        "200":
          description: All services healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: One or more services unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /docs:
    get:
      summary: OpenAPI specification
      description: Returns this OpenAPI 3.0.3 specification as YAML.
      operationId: getDocs
      tags: [Public]
      responses:
        "200":
          description: OpenAPI spec
          content:
            application/yaml:
              schema:
                type: string

  /graph/stats:
    get:
      summary: Graph statistics
      description: Returns node and edge counts grouped by kind.
      operationId: getGraphStats
      tags: [Graph]
      responses:
        "200":
          description: Stats retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphStats"

  /graph/nodes:
    get:
      summary: List nodes
      description: List graph nodes with optional kind filter.
      operationId: listNodes
      tags: [Graph]
      parameters:
        - name: kind
          in: query
          schema:
            type: string
          description: Filter by node label (e.g. MCPServer, MCPTool)
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 10000
      responses:
        "200":
          description: Nodes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Node"

  /graph/nodes/{id}:
    get:
      summary: Get node
      description: Returns a single node with all connected edges.
      operationId: getNode
      tags: [Graph]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Node with edges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /graph/edges:
    get:
      summary: List edges
      description: List graph edges with optional filters.
      operationId: listEdges
      tags: [Graph]
      parameters:
        - name: kind
          in: query
          schema:
            type: string
          description: Filter by edge kind (e.g. TRUSTS_SERVER, CAN_REACH)
        - name: source
          in: query
          schema:
            type: string
          description: Filter by source node ID
        - name: target
          in: query
          schema:
            type: string
          description: Filter by target node ID
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 10000
      responses:
        "200":
          description: Edges list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Edge"

  /ingest:
    post:
      summary: Ingest collector output
      description: >-
        Upload collector JSON. Runs the full pipeline: validate, normalize,
        deduplicate, write to Neo4j, post-process composite edges.
        Rate limited to 20 requests/minute. Max body 100 MB.
      operationId: ingest
      tags: [Ingest]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Collector JSON output (see graph model docs)
      responses:
        "200":
          description: Ingest successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  /analysis/shortest-path:
    post:
      summary: Shortest path
      description: Find the shortest path between two nodes in the graph.
      operationId: shortestPath
      tags: [Analysis]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PathRequest"
      responses:
        "200":
          description: Paths found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /analysis/all-paths:
    post:
      summary: All paths
      description: Enumerate all paths between two nodes (bounded by max_hops and limit).
      operationId: allPaths
      tags: [Analysis]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PathRequest"
      responses:
        "200":
          description: Paths found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /analysis/weighted-path:
    post:
      summary: Weighted (lowest-risk) path
      description: >-
        Find the lowest-risk-weight path using Dijkstra (APOC) or
        shortestPath+reduce fallback. Response includes the algorithm used.
      operationId: weightedPath
      tags: [Analysis]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PathRequest"
      responses:
        "200":
          description: Weighted path found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PathResponse"
        "400":
          $ref: "#/components/responses/ValidationError"

  /analysis/findings:
    get:
      summary: Security findings
      description: List all composite edges as security findings.
      operationId: getFindings
      tags: [Analysis]
      parameters:
        - name: severity
          in: query
          schema:
            type: string
            enum: [critical, high, medium, low]
      responses:
        "200":
          description: Findings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Finding"

  /analysis/prebuilt:
    get:
      summary: List pre-built queries
      description: Returns metadata for all 17 pre-built security queries.
      operationId: listPreBuilt
      tags: [Analysis]
      responses:
        "200":
          description: Query list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PreBuiltQuery"

  /analysis/prebuilt/{id}:
    get:
      summary: Execute pre-built query
      description: Run a pre-built query by ID and return results.
      operationId: runPreBuilt
      tags: [Analysis]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreBuiltResult"
        "404":
          $ref: "#/components/responses/NotFound"

  /scans:
    get:
      summary: List scans
      description: List scan history with pagination.
      operationId: listScans
      tags: [Scans]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Scan list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Scan"
    post:
      summary: Create scan
      description: Register a new scan.
      operationId: createScan
      tags: [Scans]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScanRequest"
      responses:
        "201":
          description: Scan created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scan"
        "400":
          $ref: "#/components/responses/ValidationError"

  /scans/{id}:
    get:
      summary: Get scan
      description: Get scan details by ID.
      operationId: getScan
      tags: [Scans]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Scan details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Scan"
        "404":
          $ref: "#/components/responses/NotFound"

  /query:
    post:
      summary: Raw Cypher query
      description: >-
        Execute a raw Cypher query against Neo4j.
        Rate limited to 10 requests/minute.
      operationId: rawQuery
      tags: [Admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: Query results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"
