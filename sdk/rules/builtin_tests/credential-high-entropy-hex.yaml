tests:
  - input: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6"
    should_match: true
    description: "high entropy hex string (likely a secret)"
  - input: "00000000"
    should_match: false
    description: "low entropy repeating hex"
  - input: "abcd"
    should_match: false
    description: "below minimum length"
  - input: "not-hex-chars!"
    should_match: false
    description: "contains non-hex chars -- rejected by charset gate"
