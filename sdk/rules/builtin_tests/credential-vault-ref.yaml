tests:
  - input: "vault://secret/data/myapp/api-key"
    should_match: true
    description: "HashiCorp Vault reference"
  - input: "ssm:///myapp/prod/db-password"
    should_match: true
    description: "AWS SSM Parameter Store reference"
  - input: "arn:aws:secretsmanager:us-east-1:123456:secret:myapp-AbCdEf"
    should_match: true
    description: "AWS Secrets Manager ARN"
  - input: "sk-ant-abc123xyz"
    should_match: false
    description: "API key, not a vault reference"
  - input: "hardcoded-password-123"
    should_match: false
    description: "hardcoded value, not a vault reference"
