tests:
  - input: "aK3xMnPq7RsTuVwYz9BcDeFgHiJkLmNo"
    should_match: true
    description: "high entropy string in pure base64 charset"
  - input: "password"
    should_match: false
    description: "low entropy common word"
  - input: "abc"
    should_match: false
    description: "below minimum length"
  - input: "hello world with spaces"
    should_match: false
    description: "contains non-base64 chars (spaces) -- rejected by charset gate"
