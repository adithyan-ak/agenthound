id: injection-always-use
name: Always Use This Tool
description: >
  Detects imperative directives that attempt to force tool selection,
  such as "always use this tool" or "you must use".
version: 1
enabled: true
scope:
  collector: all
  targets:
    - tool.description
    - skill.description
    - server.instructions
    - instruction.content
severity: high
owasp: [MCP04, ASI03]
tags: [injection, prompt-injection]
matcher:
  type: regex
  pattern: '\b(always\s+use\s+this\s+tool|you\s+must\s+use)'
  case_insensitive: true
emit:
  finding_type: has_injection_patterns
  labels: [always_use]
