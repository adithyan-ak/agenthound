id: credential-format-detect
name: Credential Format Detection
description: >
  Detects known API key and token formats by their distinctive prefixes.
  Identifies Anthropic (sk-ant-), OpenAI (sk-), Slack (xoxb-, xoxp-, xoxs-),
  GitHub (ghp_, gho_, ghs_), and AWS (AKIA) credentials.
version: 1
enabled: true
scope:
  collector: config
  targets: [credential.value]
severity: high
owasp: [MCP07, ASI09]
tags: [credential]
matcher:
  type: prefix
  prefixes: ["sk-ant-", "sk-", "xoxb-", "xoxp-", "xoxs-", "ghp_", "gho_", "ghs_", "AKIA"]
  case_insensitive: false
emit:
  finding_type: credential_format
tests:
  - input: "sk-ant-abc123xyz456def789ghi"
    should_match: true
    description: "Anthropic API key"
  - input: "sk-abc123xyz456def789ghi"
    should_match: true
    description: "OpenAI API key"
  - input: "xoxb-123456789-abcdefgh"
    should_match: true
    description: "Slack bot token"
  - input: "ghp_ABCDEFghijklmnopqrst1234567890ab"
    should_match: true
    description: "GitHub personal access token"
  - input: "AKIAIOSFODNN7EXAMPLE"
    should_match: true
    description: "AWS access key ID"
  - input: "some-random-api-key-value"
    should_match: false
    description: "generic value with no known prefix"
  - input: "vault://secret/data/key"
    should_match: false
    description: "vault reference, not a credential format"
