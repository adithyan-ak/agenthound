id: credential-format-detect
name: Credential Format Detection
description: >
  Detects known API key and token formats by their distinctive prefixes.
  Identifies Anthropic (sk-ant-), OpenAI (sk-), Slack (xoxb-, xoxp-, xoxs-),
  GitHub (ghp_, gho_, ghs_), and AWS (AKIA) credentials.
version: 1
enabled: true
scope:
  collector: config
  targets: [credential.value]
severity: high
owasp: [MCP07, ASI09]
tags: [credential]
matcher:
  type: prefix
  prefixes: ["sk-ant-", "sk-", "xoxb-", "xoxp-", "xoxs-", "ghp_", "gho_", "ghs_", "AKIA"]
  case_insensitive: false
emit:
  finding_type: credential_format
