# Ollama fingerprint rule (v0.2).
#
# Identifies an Ollama LLM inference server. Default port 11434, no
# authentication by default — see docs/plans/sprint3-offensive-primitives.md
# 2.1 for the protocol context. The fingerprint is a single GET to
# /api/version that returns deterministic JSON of the form
# {"version": "X.Y.Z"}; this is the minimum probe set that distinguishes
# Ollama from anything else listening on 11434.
#
# Captures the version into the emitted node so downstream queries can
# pivot on Ollama version (CVE-2024-37032 affects < 0.1.34).
id: ollama
name: Ollama LLM inference server
description: 'Identifies Ollama by GET /api/version returning {"version": "X.Y.Z"}'
version: 2
service_kind: ollama
probes:
  - method: GET
    path: /api/version
    matchers:
      - type: http_status
        status_code: 200
      - type: json_path
        path: "$.version"
        regex: '^\d+\.\d+\.\d+'
    captures:
      version: "$.version"
emit:
  node_kinds:
    - OllamaInstance
    - AIService
  properties:
    service_kind: ollama
    auth_method: none
    is_anonymous_loot: "true"
    version: "{capture:version}"
