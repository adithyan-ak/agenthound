# Jupyter Server fingerprint rule (v0.3).
#
# Jupyter Server (the modern Jupyter Notebook backend) listens on 8888 by
# default and serves a JSON-API at /api/. The unauthenticated probe target
# is /api/status, which on a no-auth or token-only-write server returns:
#   {"started":"...","last_activity":"...","connections":N,"kernels":N}
#
# Disambiguating from anything else listening on 8888 (or from a JupyterHub
# parent — JupyterHub doesn't proxy /api/status in this shape): we match
# the canonical four keys. last_activity + started are the strongest
# tells; both are ISO-8601 timestamps. We pick `started` since `last_activity`
# can change between probe attempts.
#
# Auth posture: Jupyter's default since 5.0 is token-required for
# notebook execution but /api/status is open. Server flagged as auth_method
# 'token' regardless because executing notebooks (the loot path) requires
# a token — auth_method here describes the resource we'd loot, not the
# probe surface.
id: jupyter
name: Jupyter Server
description: 'Identifies Jupyter Server by GET /api/status returning the canonical Jupyter status JSON'
version: 2
service_kind: jupyter
probes:
  - method: GET
    path: /api/status
    matchers:
      - type: http_status
        status_code: 200
      - type: json_path
        path: "$.started"
        regex: '\d{4}-\d{2}-\d{2}T'
      - type: body_contains
        value: '"last_activity"'
emit:
  node_kinds:
    - JupyterServer
    - AIService
  properties:
    service_kind: jupyter
    auth_method: token
    is_anonymous_loot: "false"
