id: credential-vault-ref
name: Vault Reference Detection
description: >
  Detects credential values that reference external secret managers
  (HashiCorp Vault, AWS SSM, AWS Secrets Manager) by their URI prefixes.
version: 1
enabled: true
scope:
  collector: config
  targets: [credential.value]
severity: info
owasp: [MCP07, ASI09]
tags: [credential]
matcher:
  type: prefix
  prefixes: ["vault://", "ssm://", "arn:aws:secretsmanager"]
  case_insensitive: true
emit:
  finding_type: credential_type
  property_key: type
  property_value: vaultRef
tests:
  - input: "vault://secret/data/myapp/api-key"
    should_match: true
    description: "HashiCorp Vault reference"
  - input: "ssm:///myapp/prod/db-password"
    should_match: true
    description: "AWS SSM Parameter Store reference"
  - input: "arn:aws:secretsmanager:us-east-1:123456:secret:myapp-AbCdEf"
    should_match: true
    description: "AWS Secrets Manager ARN"
  - input: "sk-ant-abc123xyz"
    should_match: false
    description: "API key, not a vault reference"
  - input: "hardcoded-password-123"
    should_match: false
    description: "hardcoded value, not a vault reference"
