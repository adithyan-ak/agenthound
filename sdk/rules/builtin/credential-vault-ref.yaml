id: credential-vault-ref
name: Vault Reference Detection
description: >
  Detects credential values that reference external secret managers
  (HashiCorp Vault, AWS SSM, AWS Secrets Manager) by their URI prefixes.
version: 1
enabled: true
scope:
  collector: config
  targets: [credential.value]
severity: info
owasp: [MCP07, ASI09]
tags: [credential]
matcher:
  type: prefix
  prefixes: ["vault://", "ssm://", "arn:aws:secretsmanager"]
  case_insensitive: true
emit:
  finding_type: credential_type
  property_key: type
  property_value: vaultRef
