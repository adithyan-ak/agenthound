id: sensitivity-high
name: High Sensitivity Resource
description: >
  Classifies resource URIs as high sensitivity. Matches any database
  connection (postgres/mysql/mongodb/redis without requiring "prod"),
  /var/log/ paths, and config files with secret/password keywords.
version: 1
enabled: true
scope:
  collector: mcp
  targets: [resource.uri]
severity: high
owasp: [MCP06, ASI08]
tags: [sensitivity, resource-classification]
matcher:
  type: compound
  operator: or
  matchers:
    - type: prefix
      prefixes: ["postgres://", "postgresql://", "mysql://", "mongodb://", "redis://"]
      case_insensitive: true
    - type: regex
      pattern: '^file:///var/log(/|$)'
      case_insensitive: true
    - type: regex
      pattern: '^file://.*(secret|password).*\.(conf|cfg|ini|yaml|yml|json)$'
      case_insensitive: true
emit:
  finding_type: sensitivity_classification
  property_key: sensitivity
  property_value: high
tests:
  - input: "postgres://dev-db:5432/myapp"
    should_match: true
    description: "any postgres connection is high sensitivity"
  - input: "redis://cache.internal:6379"
    should_match: true
    description: "any redis connection is high sensitivity"
  - input: "file:///var/log/syslog"
    should_match: true
    description: "system log directory"
  - input: "file:///app/config/secrets.yaml"
    should_match: true
    description: "config file with secret in name"
  - input: "file:///app/src/main.go"
    should_match: false
    description: "normal source file"
  - input: "https://api.example.com/v1"
    should_match: false
    description: "HTTP URL is medium, not high"
