id: injection-imperative-override
name: Imperative Override in Instructions
description: >
  Detects imperative identity/instruction override phrases in instruction
  files, such as "you are now", "your new instructions", or "system prompt:".
  These indicate attempts to hijack the agent's identity or behavior.
version: 1
enabled: true
scope:
  collector: all
  targets:
    - instruction.content
severity: critical
owasp: [MCP09, ASI07]
tags: [injection, prompt-injection, instruction-poisoning]
matcher:
  type: regex
  pattern: '\b(you\s+are\s+now|your\s+new\s+instructions|system\s+prompt\s*:)'
  case_insensitive: true
emit:
  finding_type: has_injection_patterns
  labels: [imperative_override]
