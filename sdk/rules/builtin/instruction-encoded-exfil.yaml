id: instruction-encoded-exfil
name: Encoded Data Exfiltration
description: >
  Detects instructions that encode data (base64/btoa) and then transmit
  it externally within 30 chars. Two-step pattern is a strong signal of data theft.
  Uses a single regex with proximity constraint (.{0,30}) to avoid false positives
  on long documents where "base64" and "http" appear far apart.
version: 1
enabled: true
scope:
  collector: config
  targets:
    - instruction.content
severity: critical
owasp: [MCP09, ASI07]
tags: [instruction-poisoning, exfiltration]
matcher:
  type: regex
  pattern: '(base64\s+(encode|enc)|btoa)\s*.{0,30}(send|post|curl|fetch|upload|http)'
  case_insensitive: true
emit:
  finding_type: has_injection_patterns
  labels: [encoded_exfil]
