id: injection-ignore-previous
name: Ignore Previous Instructions
description: >
  Detects phrases that attempt to override prior LLM context by instructing
  the model to ignore, disregard, or forget previous instructions.
version: 1
enabled: true
scope:
  collector: all
  targets:
    - tool.description
    - skill.description
    - server.instructions
    - instruction.content
severity: critical
owasp: [MCP04, ASI03]
tags: [injection, prompt-injection]
matcher:
  type: regex
  pattern: '\b(ignore\s+previous\s+instructions|disregard\s+(the\s+)?above|forget\s+(all\s+)?earlier|ignore\s+all\s+prior|disregard\s+previous)'
  case_insensitive: true
emit:
  finding_type: has_injection_patterns
  labels: [ignore_previous]
