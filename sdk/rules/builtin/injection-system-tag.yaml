id: injection-system-tag
name: System Tag Injection
description: >
  Detects <system> XML-style tags in tool descriptions, used in prompt
  injection attacks to simulate system-level instructions.
version: 1
enabled: true
scope:
  collector: all
  targets:
    - tool.description
    - skill.description
    - server.instructions
    - instruction.content
severity: critical
owasp: [MCP04, ASI03]
tags: [injection, prompt-injection]
matcher:
  type: regex
  pattern: '</?system>'
  case_insensitive: true
emit:
  finding_type: has_injection_patterns
  labels: [system_tag]
