id: sensitivity-critical
name: Critical Sensitivity Resource
description: >
  Classifies resource URIs as critical sensitivity. Matches production
  databases (postgres/mysql/mongodb/redis with "prod"), system files
  (/etc/shadow, /etc/passwd, /root/), critical file extensions
  (.env, .key, .pem, .crt, .p12, .pfx, .jks), critical path segments
  (/credentials, /secrets, /.ssh/), and cloud storage with "prod".
version: 1
enabled: true
scope:
  collector: mcp
  targets: [resource.uri]
severity: critical
owasp: [MCP06, ASI08]
tags: [sensitivity, resource-classification]
matcher:
  type: compound
  operator: or
  matchers:
    - type: regex
      pattern: '^(postgres(ql)?|mysql|mongodb)://.*prod'
      case_insensitive: true
    - type: regex
      pattern: '^redis://.*prod'
      case_insensitive: true
    - type: regex
      pattern: '^file:///etc/(shadow|passwd)(/|$)'
      case_insensitive: true
    - type: regex
      pattern: '^file:///root(/|$)'
      case_insensitive: true
    - type: regex
      pattern: '^file://.*\.(env|key|pem|crt|p12|pfx|jks)$'
      case_insensitive: true
    - type: keyword
      keywords: [/credentials, /secrets, "/.ssh/"]
      case_insensitive: true
      match_mode: any
    - type: regex
      pattern: '^(s3|gs)://.*prod'
      case_insensitive: true
emit:
  finding_type: sensitivity_classification
  property_key: sensitivity
  property_value: critical
