id: injection-instead-of
name: Use Instead Of Other Tool
description: >
  Detects directives that redirect tool selection away from other tools,
  such as "instead of X" or "use this instead".
version: 1
enabled: true
scope:
  collector: all
  targets:
    - tool.description
    - skill.description
    - server.instructions
    - instruction.content
severity: high
owasp: [MCP04, ASI03]
tags: [injection, prompt-injection]
matcher:
  type: regex
  pattern: '\b(instead\s+of\s+\w+|use\s+this\s+instead)'
  case_insensitive: true
emit:
  finding_type: has_injection_patterns
  labels: [instead_of]
