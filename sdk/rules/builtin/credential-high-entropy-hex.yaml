id: credential-high-entropy-hex
name: High Entropy Hex Secret
description: >
  Detects credential values with high Shannon entropy in hex charset,
  indicating likely hashed or hex-encoded secrets stored as plaintext.
  The charset check is an exclusivity gate -- the entire input string must
  consist only of hex chars [0-9a-fA-F]. This replicates IsHexCharset().
version: 1
enabled: true
scope:
  collector: config
  targets: [credential.value]
severity: high
owasp: [MCP07]
tags: [credential, secret-detection]
matcher:
  type: entropy
  charset: hex
  threshold: 3.0
  min_length: 8
emit:
  finding_type: high_entropy_secret
  property_key: high_entropy
  property_value: true
