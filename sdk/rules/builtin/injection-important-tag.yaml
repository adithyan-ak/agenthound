id: injection-important-tag
name: Important Tag Injection
description: >
  Detects <IMPORTANT> XML-style tags in tool descriptions, commonly used
  in prompt injection attacks to override LLM behavior.
version: 1
enabled: true
scope:
  collector: all
  targets:
    - tool.description
    - skill.description
    - server.instructions
    - instruction.content
severity: critical
owasp: [MCP04, ASI03]
tags: [injection, prompt-injection]
matcher:
  type: regex
  pattern: '</?IMPORTANT>'
  case_insensitive: true
emit:
  finding_type: has_injection_patterns
  labels: [important_tag]
