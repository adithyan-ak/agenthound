id: credential-high-entropy-base64
name: High Entropy Base64 Secret
description: >
  Detects credential values with high Shannon entropy in base64 charset,
  indicating likely API keys or tokens stored as plaintext. The charset
  check is an exclusivity gate -- the entire input string must consist
  only of base64 chars [A-Za-z0-9+/=]. This replicates IsBase64Charset().
version: 1
enabled: true
scope:
  collector: config
  targets: [credential.value]
severity: high
owasp: [MCP07]
tags: [credential, secret-detection]
matcher:
  type: entropy
  charset: base64
  threshold: 4.5
  min_length: 8
emit:
  finding_type: high_entropy_secret
  property_key: high_entropy
  property_value: true
