name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Create UI embed stub
        run: mkdir -p server/internal/api/ui/dist && echo '<!DOCTYPE html><html><body></body></html>' > server/internal/api/ui/dist/index.html
      - uses: golangci/golangci-lint-action@v7
        with:
          version: "v2.11"

  test:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:4.4-community
        env:
          NEO4J_AUTH: neo4j/testpassword
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agenthound_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Create UI embed stub
        run: mkdir -p server/internal/api/ui/dist && echo '<!DOCTYPE html><html><body></body></html>' > server/internal/api/ui/dist/index.html
      - run: go test ./... -v -race -coverprofile=coverage.out
        env:
          AGENTHOUND_NEO4J_URI: bolt://localhost:7687
          AGENTHOUND_NEO4J_USER: neo4j
          AGENTHOUND_NEO4J_PASSWORD: testpassword
          AGENTHOUND_PG_URI: postgres://test:test@localhost:5432/agenthound_test?sslmode=disable
      - run: go tool cover -func=coverage.out
      - name: Check coverage threshold
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep ^total: | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          echo "::notice::Total coverage: ${TOTAL}% — raise threshold as tests are added to appdb, graph, cli"
          # Threshold: current floor to prevent regressions.
          # Ratchet up as untested packages gain tests.
          if [ "$(echo "$TOTAL < 63" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below 63% threshold"
            exit 1
          fi
      - name: Run govulncheck
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/ui/package-lock.json
      - run: cd server/ui && npm ci && npm run build
      - run: mkdir -p server/internal/api/ui && cp -r server/ui/dist server/internal/api/ui/dist
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go build -o bin/agenthound ./collector/cmd/agenthound
      - run: go build -o bin/agenthound-server ./server/cmd/agenthound-server
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build standard image (validate only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.standard
          push: false
          tags: agenthound:standard
      - name: Build slim image (validate only)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: agenthound:slim
