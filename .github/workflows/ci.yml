name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so a force-push or rapid PR pushes
# don't pile up redundant matrix runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.25.11"
      - name: Create UI embed stub
        run: mkdir -p server/internal/api/ui/dist && echo '<!DOCTYPE html><html><body></body></html>' > server/internal/api/ui/dist/index.html
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee
        with:
          version: "v2.11"
      - name: Check licenses
        run: |
          go install github.com/google/go-licenses@latest
          "$(go env GOPATH)/bin/go-licenses" check \
            --allowed_licenses=Apache-2.0,MIT,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0,Unlicense,Zlib \
            ./collector/cmd/agenthound/... \
            ./server/cmd/agenthound-server/...

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.25.11"
      - name: Create UI embed stub
        run: mkdir -p server/internal/api/ui/dist && echo '<!DOCTYPE html><html><body></body></html>' > server/internal/api/ui/dist/index.html
      - name: Run unit tests
        run: go test ./... -short -race -coverprofile=coverage.out
      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | grep ^total:
          TOTAL=$(go tool cover -func=coverage.out | grep ^total: | awk '{print $3}' | tr -d '%')
          if [ "$(echo "$TOTAL < 55" | bc -l)" -eq 1 ]; then
            echo "::error::Unit-test coverage ${TOTAL}% is below 55% threshold"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/ui/package-lock.json
      - run: cd server/ui && npm ci --ignore-scripts && npm run build
      - run: mkdir -p server/internal/api/ui && cp -r server/ui/dist server/internal/api/ui/dist
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.25.11"
      - name: Build collector
        run: go build -o bin/agenthound ./collector/cmd/agenthound
      - name: Build server
        run: go build -o bin/agenthound-server ./server/cmd/agenthound-server
      - name: Deps-check
        run: bash scripts/deps-check.sh
      - name: Size-check
        run: bash scripts/size-check.sh

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/ui/package-lock.json
      # --ignore-scripts: no lifecycle hooks relied upon; eslint/vitest run from node_modules/.bin
      - name: Install UI deps
        run: cd server/ui && npm ci --ignore-scripts
      - name: Lint (architecture import boundaries)
        run: cd server/ui && npm run lint
      - name: Unit tests (vitest)
        run: cd server/ui && npm test
      # SLOP_SKIP=hardcoded-grids: the dashboard grid-cols -> Every-Layout migration is
      # a deferred, visually-QA'd task; the other design-system rules are enforced now.
      - name: Slop-check (design-system gate)
        run: SLOP_SKIP=hardcoded-grids bash scripts/slop-check.sh

  test-integration:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [test-unit]
    services:
      neo4j:
        image: neo4j:4.4-community
        env:
          NEO4J_AUTH: neo4j/testpassword
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agenthound_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      AGENTHOUND_NEO4J_URI: bolt://localhost:7687
      AGENTHOUND_NEO4J_USER: neo4j
      AGENTHOUND_NEO4J_PASSWORD: testpassword
      AGENTHOUND_PG_URI: postgres://test:test@localhost:5432/agenthound_test?sslmode=disable
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.25.11"
      - name: Create UI embed stub
        run: mkdir -p server/internal/api/ui/dist && echo '<!DOCTYPE html><html><body></body></html>' > server/internal/api/ui/dist/index.html
      - name: Run full test suite with DB
        run: go test ./... -race -coverprofile=coverage.out
      - name: Check coverage threshold
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep ^total: | awk '{print $3}' | tr -d '%')
          echo "::notice::Full-suite coverage: ${TOTAL}%"
          if [ "$(echo "$TOTAL < 60" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below 60% threshold"
            exit 1
          fi

  govulncheck:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.25.11"
      - name: Create UI embed stub
        run: mkdir -p server/internal/api/ui/dist && echo '<!DOCTYPE html><html><body></body></html>' > server/internal/api/ui/dist/index.html
      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  xplatform-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    strategy:
      fail-fast: false
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.25.11"
      - name: Create UI embed stub
        run: mkdir -p server/internal/api/ui/dist && echo '<!DOCTYPE html><html><body></body></html>' > server/internal/api/ui/dist/index.html
      - name: Build collector
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: go build -trimpath -ldflags='-s -w' -o /dev/null ./collector/cmd/agenthound
      - name: Build server
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: go build -trimpath -ldflags='-s -w' -o /dev/null ./server/cmd/agenthound-server

  docker:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5
      - name: Build collector image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: docker/Dockerfile.agenthound
          push: false
      - name: Build server image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: docker/Dockerfile.agenthound-server
          push: false
      - name: Build standard image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: docker/Dockerfile.standard
          push: false
