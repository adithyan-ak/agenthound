name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so a force-push or rapid PR pushes
# don't pile up redundant matrix runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.25.10"
      - name: Create UI embed stub
        run: mkdir -p server/internal/api/ui/dist && echo '<!DOCTYPE html><html><body></body></html>' > server/internal/api/ui/dist/index.html
      - uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa
        with:
          version: "v2.11"
      - name: Check licenses
        run: |
          go install github.com/google/go-licenses@latest
          "$(go env GOPATH)/bin/go-licenses" check \
            --allowed_licenses=Apache-2.0,MIT,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0,Unlicense,Zlib \
            ./collector/cmd/agenthound/... \
            ./server/cmd/agenthound-server/...

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.25.10"
      - name: Create UI embed stub
        run: mkdir -p server/internal/api/ui/dist && echo '<!DOCTYPE html><html><body></body></html>' > server/internal/api/ui/dist/index.html
      - name: Run unit tests
        run: go test ./... -short -race -coverprofile=coverage.out
      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | grep ^total:
          TOTAL=$(go tool cover -func=coverage.out | grep ^total: | awk '{print $3}' | tr -d '%')
          if [ "$(echo "$TOTAL < 55" | bc -l)" -eq 1 ]; then
            echo "::error::Unit-test coverage ${TOTAL}% is below 55% threshold"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/ui/package-lock.json
      - run: cd server/ui && npm ci --ignore-scripts && npm run build
      - run: mkdir -p server/internal/api/ui && cp -r server/ui/dist server/internal/api/ui/dist
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.25.10"
      - name: Build collector
        run: go build -o bin/agenthound ./collector/cmd/agenthound
      - name: Build server
        run: go build -o bin/agenthound-server ./server/cmd/agenthound-server
      - name: Deps-check
        run: bash scripts/deps-check.sh
      - name: Size-check
        run: bash scripts/size-check.sh

  test-integration:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [test-unit]
    services:
      neo4j:
        image: neo4j:4.4-community
        env:
          NEO4J_AUTH: neo4j/testpassword
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agenthound_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      AGENTHOUND_NEO4J_URI: bolt://localhost:7687
      AGENTHOUND_NEO4J_USER: neo4j
      AGENTHOUND_NEO4J_PASSWORD: testpassword
      AGENTHOUND_PG_URI: postgres://test:test@localhost:5432/agenthound_test?sslmode=disable
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.25.10"
      - name: Create UI embed stub
        run: mkdir -p server/internal/api/ui/dist && echo '<!DOCTYPE html><html><body></body></html>' > server/internal/api/ui/dist/index.html
      - name: Run full test suite with DB
        run: go test ./... -race -coverprofile=coverage.out
      - name: Check coverage threshold
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep ^total: | awk '{print $3}' | tr -d '%')
          echo "::notice::Full-suite coverage: ${TOTAL}%"
          if [ "$(echo "$TOTAL < 60" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below 60% threshold"
            exit 1
          fi

  govulncheck:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.25.10"
      - name: Create UI embed stub
        run: mkdir -p server/internal/api/ui/dist && echo '<!DOCTYPE html><html><body></body></html>' > server/internal/api/ui/dist/index.html
      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  xplatform-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    strategy:
      fail-fast: false
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.25.10"
      - name: Create UI embed stub
        run: mkdir -p server/internal/api/ui/dist && echo '<!DOCTYPE html><html><body></body></html>' > server/internal/api/ui/dist/index.html
      - name: Build collector
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: go build -trimpath -ldflags='-s -w' -o /dev/null ./collector/cmd/agenthound
      - name: Build server
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: go build -trimpath -ldflags='-s -w' -o /dev/null ./server/cmd/agenthound-server

  docker:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Build collector image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: docker/Dockerfile.agenthound
          push: false
      - name: Build server image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: docker/Dockerfile.agenthound-server
          push: false
      - name: Build standard image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: docker/Dockerfile.standard
          push: false
